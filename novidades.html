<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novidades · FinFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/variables.css">
  <link rel="stylesheet" href="src/css/global.css">
  <link rel="stylesheet" href="src/css/components.css">
  <link rel="stylesheet" href="src/css/layout.css">
</head>
<body>
  <div class="app-shell">
    <div class="app-sidebar" id="sidebar-container"></div>

    <header class="app-header header">
      <div class="header-left">
        <h2 class="header-title">Novidades</h2>
      </div>
    </header>

    <main class="app-main main">
      <div class="page-header">
        <div class="page-header-content">
          <p class="page-eyebrow">Versões</p>
          <h1 class="page-title" data-i18n-key="novidades.titulo">Novidades</h1>
          <p class="page-description" data-i18n-key="novidades.descricao">Registro de todas as melhorias, correções e novas funcionalidades publicadas no FinFlow.</p>
        </div>
      </div>

      <div id="novidades-content" style="max-width: 680px;">
        <!-- Roadmap (em progresso) -->
        <section id="roadmap-section" class="roadmap-section hidden">
          <header class="roadmap-section-header">
            <h2 class="roadmap-section-title">No forno</h2>
            <p class="roadmap-section-hint">Sugestões da comunidade que estão sendo trabalhadas.</p>
          </header>
          <div id="roadmap-list" class="roadmap-list"></div>
        </section>

        <!-- Changelog -->
        <div id="changelog-content"></div>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="src/js/pages/novidades.js"></script>
</body>
</html>
