<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Novidades · FinFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=block" rel="stylesheet">
  <link rel="stylesheet" href="src/css/variables.css">
  <link rel="stylesheet" href="src/css/global.css">
  <link rel="stylesheet" href="src/css/components.css">
  <link rel="stylesheet" href="src/css/layout.css">
</head>
<body>
  <div class="app-shell">
    <div class="app-sidebar" id="sidebar-container"></div>

    <header class="app-header header">
      <div class="header-left">
        <h2 class="header-title">Novidades</h2>
      </div>
    </header>

    <main class="app-main main">
      <div class="page-header">
        <div class="page-header-content">
          <p class="page-eyebrow">Versões</p>
          <h1 class="page-title" data-i18n-key="novidades.titulo">Novidades</h1>
          <p class="page-description" data-i18n-key="novidades.descricao">Registro de todas as melhorias, correções e novas funcionalidades publicadas no FinFlow.</p>
        </div>
      </div>

      <div class="nov-content">

        <!-- ── Top grid: Em desenvolvimento (esq) + Últimas atualizações (dir) ── -->
        <div class="nov-top-grid" id="nov-top-grid">

          <!-- ESQUERDA: Em desenvolvimento (aparece só quando há itens aprovados) -->
          <section class="nov-section nov-col-left hidden" id="nov-aprovadas-section">
            <h2 class="nov-section-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" width="15" height="15"
                   style="color:var(--color-primary)">
                <path d="M9 12l2 2 4-4"/>
                <path d="M21 12c0 4.97-4.03 9-9 9S3 16.97 3 12 7.03 3 12 3s9 4.03 9 9z"/>
              </svg>
              Em desenvolvimento
            </h2>
            <p class="nov-section-hint">Sugestões aprovadas para implementar em breve.</p>
            <div id="nov-aprovadas-list" class="nov-aprovadas-list"></div>
          </section>

          <!-- DIREITA: Últimas atualizações (últimas 3 versões com scroll interno) -->
          <section class="nov-section nov-col-right">
            <h2 class="nov-section-title">Últimas atualizações</h2>
            <div id="nov-featured" class="nov-featured-list"></div>
          </section>

        </div>

        <!-- ── Histórico (versões mais antigas, 2 colunas) ────────────────────── -->
        <section class="nov-section hidden" id="nov-history-section">
          <h2 class="nov-section-title">Histórico</h2>
          <div id="nov-history-list" class="nov-history-list"></div>
        </section>

      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="src/js/pages/novidades.js"></script>
</body>
</html>
