  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

riables.css anterior (v1.0.5 com Indigo+Salmão).\n   Nova paleta: Roxo Tech + Lime (Mix A+D · aprovado).\n   Suporta dois modos: light (default) + dark (via [data-theme=\"dark\"]).\n\n   Fonte da verdade pra toda decisão visual do produto.\n   Não usar hex hardcoded em components.css ou nas páginas — sempre var().\n   ============================================================================ */\n\n:root {\n\n  /* ────────────────────────────────────────────────────────────────────────\n     1. CORES PRIMÁRIAS — Roxo Tech\n     ──────────────────────────────────────────────────────────────────────── */\n  --color-primary-50:  #F1EFFE;\n  --color-primary-100: #E5E1FD;\n  --color-primary-200: #D2CCFB;\n  --color-primary-300: #B5ACF8;\n  --color-primary-400: #8B7FF7;\n  --color-primary-500: #6D5EF5;  /* ★ Roxo principal — ações primárias */\n  --color-primary-600: #5B4FE0;\n  --color-primary-700: #4B3FD6;\n  --color-primary-800: #3A30B0;\n  --color-primary-900: #2A2384;\n\n  /* Aliases legados (backward compat com variables.css v1) */\n  --color-primary:      var(--color-primary-500);\n  --color-primary-dark: var(--color-primary-700);\n  --color-primary-light:var(--color-primary-400);\n\n  /* ────────────────────────────────────────────────────────────────────────\n     2. CORES ACENTO — Lime\n     ──────────────────────────────────────────────────────────────────────── */\n  --color-accent-50:  #F7FEE7;\n  --color-accent-100: #ECFCCB;\n  --color-accent-200: #DFFBA5;\n  --color-accent-300: #D2F873;\n  --color-accent-400: #C2F542;   /* ★ Lime principal */\n  --color-accent-500: #A3D331;\n  --color-accent-600: #84B121;\n  --color-accent-700: #65880F;\n  --color-accent-800: #4D6A0E;\n  --color-accent-900: #2E460B;\n\n  --color-accent:      var(--color-accent-400);\n  --color-accent-dark: var(--color-accent-600);  /* usar pra texto sobre fundo claro */\n\n  /* Aliases legados */\n  --color-secondary:      var(--color-primary-500); /* o que era \"secondary\" no v1 agora é primary */\n  --color-secondary-dark: var(--color-primary-700);\n  --color-secondary-light:var(--color-primary-300);\n\n  /* ────────────────────────────────────────────────────────────────────────\n     3. NEUTROS — Slate inverte no dark mode\n     ──────────────────────────────────────────────────────────────────────── */\n  --color-ink-50:  #F8FAFC;\n  --color-ink-100: #F1F5F9;\n  --color-ink-200: #E2E8F0;\n  --color-ink-300: #CBD5E1;\n  --color-ink-400: #94A3B8;\n  --color-ink-500: #64748B;\n  --color-ink-600: #475569;\n  --color-ink-700: #334155;\n  --color-ink-800: #1E293B;\n  --color-ink-900: #0F172A;\n  --color-ink-950: #08090C;\n\n  /* Surfaces */\n  --color-paper:      #FFFFFF;   /* cards, modais */\n  --color-surface:    #FFFFFF;   /* alias canônico */\n  --color-surface-alt:#F9FAFB;\n  --color-canvas:     #FAFAF7;   /* fundo principal — cream */\n  --color-background: var(--color-canvas);\n\n  /* Aliases legados */\n  --color-text-main:      var(--color-ink-900);\n  --color-text-secondary: var(--color-ink-500);\n  --color-text-muted:     var(--color-ink-400);\n  --color-border:         var(--color-ink-200);\n  --color-border-strong:  var(--color-ink-300);\n\n  /* ────────────────────────────────────────────────────────────────────────\n     4. SIDEBAR — sempre dark, levemente diferente entre modos\n     ──────────────────────────────────────────────────────────────────────── */\n  --color-sidebar-bg:           #0F172A;\n  --color-sidebar-bg-active:    var(--color-primary-600);\n  --color-sidebar-text:         #CBD5E1;\n  --color-sidebar-text-active:  #FFFFFF;\n  --color-sidebar-text-muted:   #64748B;\n  --color-sidebar-border:       rgba(255, 255, 255, 0.06);\n\n  /* ────────────────────────────────────────────────────────────────────────\n     5. CORES SEMÂNTICAS — sucesso, atenção, erro, info\n     ──────────────────────────────────────────────────────────────────────── */\n  --color-success:      #10B981;\n  --color-success-bg:   #D1FAE5;\n  --color-success-text: #065F46;\n\n  --color-warning:      #F59E0B;\n  --color-warning-bg:   #FEF3C7;\n  --color-warning-text: #92400E;\n\n  --color-danger:       #EF4444;\n  --color-danger-bg:    #FEE2E2;\n  --color-danger-text:  #991B1B;\n\n  --color-info:         #3B82F6;\n  --color-info-bg:      #DBEAFE;\n  --color-info-text:    #1E40AF;\n\n  /* ────────────────────────────────────────────────────────────────────────\n     6. STATUS DE PAGAMENTO — 4 + default\n        bg / text pares por status. Usar var(--color-status-<x>-bg) etc.\n     ──────────────────────────────────────────────────────────────────────── */\n  --color-status-pago-bg:        #D1FAE5;\n  --color-status-pago-text:      #065F46;\n\n  --color-status-transferido-bg:   #DBEAFE;\n  --color-status-transferido-text: #1E40AF;\n\n  --color-status-transferir-bg:   #FCE7F3;\n  --color-status-transferir-text: #9D174D;\n\n  --color-status-cancelado-bg:   #F3F4F6;\n  --color-status-cancelado-text: #4B5563;\n\n  --color-status-apagar-bg:      #FEF3C7;\n  --color-status-apagar-text:    #92400E;\n\n  /* ────────────────────────────────────────────────────────────────────────\n     7. FIXED TOKENS — não invertem no dark mode\n        Usar quando o fundo está travado em uma cor de marca (hero ink-950,\n        final-cta lime, sidebar dark). Garante contraste estável.\n     ──────────────────────────────────────────────────────────────────────── */\n  --fixed-white:      #FFFFFF;\n  --fixed-dark:       #0F172A;\n  --fixed-ink-soft:   rgba(255, 255, 255, 0.75);\n  --fixed-ink-muted:  rgba(255, 255, 255, 0.55);\n  --fixed-ink-faint:  rgba(255, 255, 255, 0.40);\n\n  /* ────────────────────────────────────────────────────────────────────────\n     8. TIPOGRAFIA\n     ──────────────────────────────────────────────────────────────────────── */\n  --font-display: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n  --font-body:    'Inter',   -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n  --font-mono:    'Geist Mono', ui-monospace, 'SF Mono', Monaco, Consolas, monospace;\n\n  /* Escala (mantida do v1) */\n  --fs-xs:   0.75rem;   /* 12px */\n  --fs-sm:   0.875rem;  /* 14px */\n  --fs-base: 1rem;      /* 16px */\n  --fs-md:   1.125rem;  /* 18px */\n  --fs-lg:   1.25rem;   /* 20px */\n  --fs-xl:   1.5rem;    /* 24px */\n  --fs-2xl:  1.875rem;  /* 30px */\n  --fs-3xl:  2.25rem;   /* 36px */\n  --fs-4xl:  3rem;      /* 48px — adicionado v2 */\n  --fs-5xl:  3.75rem;   /* 60px — adicionado v2 */\n\n  --fw-normal:    400;\n  --fw-medium:    500;\n  --fw-semibold:  600;\n  --fw-bold:      700;\n  --fw-extrabold: 800;\n\n  --lh-tight:  1.2;\n  --lh-snug:   1.4;\n  --lh-normal: 1.5;\n  --lh-relaxed:1.6;\n\n  /* ────────────────────────────────────────────────────────────────────────\n     9. ESPAÇAMENTO — grid 4px\n     ──────────────────────────────────────────────────────────────────────── */\n  --space-0:  0;\n  --space-1:  0.25rem;\n  --space-2:  0.5rem;\n  --space-3:  0.75rem;\n  --space-4:  1rem;\n  --space-5:  1.25rem;\n  --space-6:  1.5rem;\n  --space-8:  2rem;\n  --space-10: 2.5rem;\n  --space-12: 3rem;\n  --space-16: 4rem;\n  --space-20: 5rem;\n  --space-24: 6rem;\n\n  /* ────────────────────────────────────────────────────────────────────────\n     10. BORDER RADIUS\n     ──────────────────────────────────────────────────────────────────────── */\n  --radius-sm:   6px;\n  --radius-md:   12px;   /* padrão pra cards e botões */\n  --radius-lg:   20px;\n  --radius-xl:   28px;\n  --radius-full: 9999px;\n\n  /* ────────────────────────────────────────────────────────────────────────\n     11. SHADOWS — assinatura com tom roxo\n     ──────────────────────────────────────────────────────────────────────── */\n  --shadow-sm:    0 1px 2px rgba(15, 23, 42, 0.05);\n  --shadow-card:  0 1px 3px rgba(15, 23, 42, 0.06),\n                  0 6px 24px rgba(109, 94, 245, 0.07);\n  --shadow-md:    0 4px 8px rgba(15, 23, 42, 0.07),\n                  0 12px 32px rgba(109, 94, 245, 0.08);\n  --shadow-lg:    0 8px 16px rgba(15, 23, 42, 0.09),\n                  0 24px 48px rgba(109, 94, 245, 0.10);\n  --shadow-xl:    0 16px 32px rgba(15, 23, 42, 0.12),\n                  0 40px 80px rgba(109, 94, 245, 0.14);\n  --shadow-modal: 0 40px 80px rgba(15, 23, 42, 0.25);\n\n  /* ────────────────────────────────────────────────────────────────────────\n     12. GRADIENTES — 3 oficiais\n     ──────────────────────────────────────────────────────────────────────── */\n  --gradient-primary:      linear-gradient(135deg, #6D5EF5 0%, #4B3FD6 100%);\n  --gradient-primary-soft: linear-gradient(135deg,\n                              rgba(109, 94, 245, 0.08) 0%,\n                              rgba(194, 245, 66, 0.08) 100%);\n  --gradient-hero:         linear-gradient(135deg, #6D5EF5 0%, #4B3FD6 50%, #C2F542 100%);\n  --gradient-night:        linear-gradient(135deg, #0F172A 0%, #1E1B45 50%, #0F172A 100%);\n\n  /* ────────────────────────────────────────────────────────────────────────\n     13. FOCUS / TRANSITIONS\n     ──────────────────────────────────────────────────────────────────────── */\n  --focus-ring:     0 0 0 3px rgba(109, 94, 245, 0.18);\n  --focus-outline:  2px solid var(--color-primary-500);\n\n  --transition-fast:   150ms cubic-bezier(0.4, 0, 0.2, 1);\n  --transition-normal: 220ms cubic-bezier(0.4, 0, 0.2, 1);\n  --transition-slow:   400ms cubic-bezier(0.4, 0, 0.2, 1);\n\n  /* ────────────────────────────────────────────────────────────────────────\n     14. Z-INDEX\n     ──────────────────────────────────────────────────────────────────────── */\n  --z-sidebar:   40;\n  --z-nav:       50;\n  --z-dropdown:  100;\n  --z-modal:     200;\n  --z-toast:     300;\n  --z-tooltip:   400;\n}\n\n\n/* ============================================================================\n   DARK MODE\n   Aplica via <html data-theme=\"dark\"> ou <body data-theme=\"dark\">.\n   Inverte: neutros, surfaces, bgs sutis de marca, pares semânticos.\n   Mantém: lime/roxo principais (mesmas cores), sidebar tone (ajustado),\n   fixed tokens (sempre claros/escuros pra fundos travados).\n   ============================================================================ */\n:root[data-theme=\"dark\"],\n[data-theme=\"dark\"] {\n\n  /* Surfaces */\n  --color-paper:      #15181F;\n  --color-surface:    #15181F;\n  --color-surface-alt:#1A1D24;\n  --color-canvas:     #0B0D12;\n  --color-background: var(--color-canvas);\n\n  /* Ink ramp invertida */\n  --color-ink-50:  #1A1D24;\n  --color-ink-100: #1F232B;\n  --color-ink-200: #2A2F39;\n  --color-ink-300: #3B4151;\n  --color-ink-400: #6B7280;\n  --color-ink-500: #94A3B8;\n  --color-ink-600: #CBD5E1;\n  --color-ink-700: #E2E8F0;\n  --color-ink-800: #F1F5F9;\n  --color-ink-900: #F8FAFC;\n  /* ink-950 stays #08090C — usado por seções always-dark */\n\n  /* Aliases recalculam (são vars, recursão funciona) */\n  --color-text-main:      var(--color-ink-900);\n  --color-text-secondary: var(--color-ink-500);\n  --color-text-muted:     var(--color-ink-400);\n  --color-border:         var(--color-ink-200);\n  --color-border-strong:  var(--color-ink-300);\n\n  /* Sidebar — tom levemente roxo no dark, distingue do canvas */\n  --color-sidebar-bg:          #14172A;\n  --color-sidebar-text:        #94A3B8;\n  --color-sidebar-text-muted:  #475569;\n  --color-sidebar-border:      rgba(255, 255, 255, 0.04);\n\n  /* Bgs sutis dos brand colors viram dark-tint */\n  --color-primary-50:  #1E1B45;\n  --color-primary-100: #2A2384;\n  --color-accent-50:   #2E460B;\n  --color-accent-100:  #4D6A0E;\n\n  /* Semânticas — invertem bg + text */\n  --color-success-bg:   #064E3B;\n  --color-success-text: #6EE7B7;\n  --color-warning-bg:   #78350F;\n  --color-warning-text: #FCD34D;\n  --color-danger-bg:    #7F1D1D;\n  --color-danger-text:  #FCA5A5;\n  --color-info-bg:      #1E3A8A;\n  --color-info-text:    #93C5FD;\n\n  /* Status invertidos */\n  --color-status-pago-bg:          #064E3B;\n  --color-status-pago-text:        #6EE7B7;\n  --color-status-transferido-bg:   #1E3A8A;\n  --color-status-transferido-text: #93C5FD;\n  --color-status-transferir-bg:    #831843;\n  --color-status-transferir-text:  #FBCFE8;\n  --color-status-cancelado-bg:     #1F2937;\n  --color-status-cancelado-text:   #9CA3AF;\n  --color-status-apagar-bg:        #78350F;\n  --color-status-apagar-text:      #FCD34D;\n\n  /* Shadows reduzem opacidade (dark já tem contraste alto sem precisar) */\n  --shadow-card:  0 1px 3px rgba(0, 0, 0, 0.35),\n                  0 6px 24px rgba(0, 0, 0, 0.20);\n  --shadow-md:    0 4px 12px rgba(0, 0, 0, 0.40);\n  --shadow-lg:    0 12px 32px rgba(0, 0, 0, 0.50);\n  --shadow-xl:    0 20px 48px rgba(0, 0, 0, 0.60);\n  --shadow-modal: 0 40px 80px rgba(0, 0, 0, 0.70);\n\n  /* Focus ring usa lime no dark pra contraste com fundos roxos */\n  --focus-ring: 0 0 0 3px rgba(194, 245, 66, 0.30);\n}\n\n\n/* ============================================================================\n   PRINT — fixa light mode, remove sombras\n   ============================================================================ */\n@media print {\n  :root, [data-theme=\"dark\"] {\n    --color-canvas: #FFFFFF;\n    --color-paper: #FFFFFF;\n    --color-ink-900: #000000;\n    --shadow-card: none;\n    --shadow-md: none;\n    --shadow-lg: none;\n  }\n}\n\n\n/* ============================================================================\n   REDUCED MOTION — acessibilidade\n   ============================================================================ */\n@media (prefers-reduced-motion: reduce) {\n  :root {\n    --transition-fast:   0.01ms;\n    --transition-normal: 0.01ms;\n    --transition-slow:   0.01ms;\n  }\n}\n\n\n/* ============================================================================\n   BACKWARDS COMPATIBILITY\n   Aliases pros nomes antigos do variables.css v1 (Indigo+Salmão).\n   Permite que código legado continue funcionando enquanto vocês migram\n   pros nomes novos. Pode remover esta seção após migração completa.\n   ============================================================================ */\n:root {\n  /* v1 usava --color-primary como #6D5EF5 e --color-secondary como #3B82F6.\n     Mantemos --color-primary igual. --color-secondary agora aponta pro mesmo\n     roxo (não tem mais \"azul secundário\" no sistema v2). */\n  --color-bg:           var(--color-canvas);\n  --color-text:         var(--color-ink-900);\n  --color-code-bg:      var(--color-ink-100);\n}\n<\u002Fstyle>\n\n<!-- Thumbnail for bundler -->\n\n\n<style>\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }\n  body {\n    font-family: var(--font-body);\n    color: var(--color-ink-900);\n    background: var(--color-canvas);\n    line-height: 1.6;\n    font-size: 15px;\n  }\n\n  /* ========================================================================\n     LAYOUT: sidebar TOC + main content\n     ======================================================================== */\n  .app {\n    display: grid;\n    grid-template-columns: 280px 1fr;\n    min-height: 100vh;\n  }\n  @media (max-width: 900px) {\n    .app { grid-template-columns: 1fr; }\n    .toc { display: none; }\n  }\n\n  /* ========================================================================\n     TOC SIDEBAR\n     ======================================================================== */\n  .toc {\n    position: sticky;\n    top: 0;\n    align-self: start;\n    height: 100vh;\n    padding: 32px 24px 32px 32px;\n    border-right: 1px solid var(--color-border);\n    background: var(--color-canvas);\n    overflow-y: auto;\n  }\n  .toc-brand {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    font-family: var(--font-display);\n    font-weight: 800;\n    font-size: 18px;\n    letter-spacing: -0.02em;\n    color: var(--color-ink-900);\n    margin-bottom: 4px;\n  }\n  .toc-brand svg { width: 22px; height: 22px; }\n  .toc-meta {\n    font-family: var(--font-mono);\n    font-size: 11px;\n    color: var(--color-ink-500);\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n    margin-bottom: 32px;\n  }\n  .toc-section {\n    font-family: var(--font-mono);\n    font-size: 10px;\n    color: var(--color-ink-400);\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    font-weight: 600;\n    padding: 16px 8px 6px;\n  }\n  .toc a {\n    display: block;\n    padding: 6px 10px;\n    border-radius: 6px;\n    color: var(--color-ink-700);\n    text-decoration: none;\n    font-size: 13px;\n    font-weight: 500;\n    line-height: 1.4;\n    transition: all 150ms;\n  }\n  .toc a:hover {\n    background: var(--color-primary-50);\n    color: var(--color-primary-700);\n  }\n  .toc a.active {\n    background: var(--color-primary-50);\n    color: var(--color-primary-700);\n    font-weight: 600;\n  }\n  .toc a .num {\n    display: inline-block;\n    font-family: var(--font-mono);\n    color: var(--color-ink-400);\n    font-size: 11px;\n    margin-right: 8px;\n    min-width: 20px;\n  }\n  .toc-tools {\n    margin-top: 24px;\n    padding-top: 20px;\n    border-top: 1px solid var(--color-border);\n  }\n  .toc-tools button {\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    width: 100%;\n    padding: 8px 12px;\n    border-radius: 8px;\n    background: var(--color-surface);\n    border: 1px solid var(--color-border);\n    color: var(--color-ink-700);\n    font-family: var(--font-body);\n    font-size: 12px;\n    font-weight: 500;\n    cursor: pointer;\n    margin-bottom: 6px;\n    text-align: left;\n    transition: all 150ms;\n  }\n  .toc-tools button:hover {\n    border-color: var(--color-primary-300);\n    color: var(--color-primary-700);\n  }\n  .toc-tools button svg { width: 14px; height: 14px; opacity: 0.7; }\n\n  /* ========================================================================\n     MAIN CONTENT\n     ======================================================================== */\n  main {\n    max-width: 920px;\n    padding: 64px 64px 128px;\n  }\n  @media (max-width: 900px) { main { padding: 32px 24px 64px; } }\n\n  /* ========================================================================\n     COVER\n     ======================================================================== */\n  .cover {\n    background: var(--color-ink-950);\n    color: var(--fixed-white);\n    border-radius: 20px;\n    padding: 72px 64px;\n    margin-bottom: 64px;\n    position: relative;\n    overflow: hidden;\n  }\n  .cover::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background:\n      radial-gradient(600px 400px at 10% 20%, rgba(109,94,245,0.4), transparent 70%),\n      radial-gradient(500px 350px at 95% 95%, rgba(194,245,66,0.15), transparent 70%);\n  }\n  .cover > * { position: relative; z-index: 1; }\n  .cover .label {\n    font-family: var(--font-mono);\n    font-size: 12px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--color-accent-400);\n    margin-bottom: 24px;\n  }\n  .cover h1 {\n    font-family: var(--font-display);\n    font-size: 64px;\n    font-weight: 800;\n    letter-spacing: -0.035em;\n    line-height: 1;\n    margin-bottom: 24px;\n  }\n  .cover h1 em { color: var(--color-accent-400); font-style: normal; }\n  .cover p.intro {\n    font-size: 18px;\n    color: var(--fixed-ink-soft);\n    max-width: 600px;\n    line-height: 1.55;\n  }\n  .cover .meta-row {\n    display: grid;\n    grid-template-columns: repeat(3, auto);\n    gap: 48px;\n    margin-top: 48px;\n    padding-top: 32px;\n    border-top: 1px solid rgba(255,255,255,0.1);\n  }\n  .cover .meta-row dt {\n    font-family: var(--font-mono);\n    font-size: 11px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--fixed-ink-muted);\n    margin-bottom: 4px;\n  }\n  .cover .meta-row dd {\n    font-family: var(--font-display);\n    font-size: 16px;\n    font-weight: 600;\n    color: var(--fixed-white);\n  }\n\n  /* =========== (Cmd+P)\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9V2h12v7\"><\u002Fpath><rect x=\"6\" y=\"14\" width=\"12\" height=\"8\"><\u002Frect><path d=\"M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2\"><\u002Fpath><\u002Fsvg>\n        Exportar como PDF\n      <\u002Fbutton>\n      <button onclick=\"toggleTheme()\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><path d=\"M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41\"><\u002Fpath><\u002Fsvg>\n        Alternar light/dark\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Faside>\n\n\n  <!-- ════════════════════════════════════════════════════════════ MAIN ═══ -->\n  <main>\n\n    <!-- ─────────────────────────────────── COVER ─── -->\n    <div class=\"cover\">\n      <div class=\"label\">Brand &amp; Visual Guide · v1.0<\u002Fdiv>\n      <h1>FinFlow,<br>como ela se <em>parece<\u002Fem>.<br>E como ela <em>fala<\u002Fem>.<\u002Fh1>\n      <p class=\"intro\">Tudo que você precisa pra desenhar, codar ou comunicar com a identidade da FinFlow no lugar certo. Para designers, devs e marketing.<\u002Fp>\n      <dl class=\"meta-row\">\n        <div>\n          <dt>Versão<\u002Fdt>\n          <dd>1.0 · Mai 2026<\u002Fdd>\n        <\u002Fdiv>\n        <div>\n          <dt>Logo<\u002Fdt>\n          <dd>Twin Track<\u002Fdd>\n        <\u002Fdiv>\n        <div>\n          <dt>Paleta<\u002Fdt>\n          <dd>Roxo Tech + Lime<\u002Fdd>\n        <\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv>\n\n\n    <!-- ─────────────────────────────────────────── 01 PARA QUEM ─── -->\n    <section class=\"s\" id=\"para-quem\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Introdução<\u002Fdiv>\n        <h2><span class=\"num\">01<\u002Fspan>Para quem é este guia<\u002Fh2>\n        <p class=\"lede\">Três audiências, três entradas. Tudo neste documento, mas você pode pular pro que importa pra você.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"audiences\">\n        <a class=\"aud\" href=\"#cores\">\n          <div class=\"ico\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"13\" cy=\"12\" r=\"9\"><\u002Fcircle><circle cx=\"7\" cy=\"10\" r=\"1.5\" fill=\"currentColor\"><\u002Fcircle><circle cx=\"11\" cy=\"6\" r=\"1.5\" fill=\"currentColor\"><\u002Fcircle><circle cx=\"17\" cy=\"8\" r=\"1.5\" fill=\"currentColor\"><\u002Fcircle><circle cx=\"19\" cy=\"14\" r=\"1.5\" fill=\"currentColor\"><\u002Fcircle><\u002Fsvg>\n          <\u002Fdiv>\n          <h3>Designer<\u002Fh3>\n          <p>Crie mockups com paleta, type, logo e componentes que combinam com a marca. Use as cores semânticas e status corretos.<\u002Fp>\n          <div class=\"links\">\n            <span>↳ Cores · Tipografia · Logo · Componentes<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <a class=\"aud\" href=\"#tokens\">\n          <div class=\"ico\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"16 18 22 12 16 6\"><\u002Fpolyline><polyline points=\"8 6 2 12 8 18\"><\u002Fpolyline><\u002Fsvg>\n          <\u002Fdiv>\n          <h3>Developer<\u002Fh3>\n          <p>Use os tokens CSS em vez de hex hardcoded. Dark mode automático. Acessibilidade já configurada.<\u002Fp>\n          <div class=\"links\">\n            <span>↳ variables.css · Componentes · A11y<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <a class=\"aud\" href=\"#do-dont-copy\">\n          <div class=\"ico\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 5h18M3 12h18M3 19h12\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h3>Marketing<\u002Fh3>\n          <p>Taglines aprovadas, tom de voz, vocabulário canônico, exemplos de copy. Sem travessões, sem clichês.<\u002Fp>\n          <div class=\"links\">\n            <span>↳ Voz · Taglines · Do/Don't · Aplicações<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n\n    <!-- ════════════════════════════════════════════════ IDENTIDADE ════ -->\n\n\n    <!-- 02 QUEM SOMOS -->\n    <section class=\"s major\" id=\"quem-somos\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Identidade da marca<\u002Fdiv>\n        <h2><span class=\"num\">02<\u002Fspan>Quem somos. E quem não somos.<\u002Fh2>\n        <p class=\"lede\">A âncora da marca. Toda decisão de copy, naming, design e tom de voz deriva dessa tabela. Personalidade aprovada, Amigável + Inteligente + Opinativo.<\u002Fp>\n      <\u002Fdiv>\n\n      <table>\n        <thead>\n          <tr><th>We Are<\u002Fth><th>We Are Not<\u002Fth><\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr><td><strong>Próximos.<\u002Fstrong> Falamos \"você\", \"vocês\", contrações (\"pra\", \"dá pra\"), explicamos sem condescender<\u002Ftd><td><strong>Íntimos demais.<\u002Fstrong> Não somos \"amigão de boteco\" nem usamos gírias datadas<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Inteligentes.<\u002Fstrong> Profundidade real (4 moedas, OFX, 23 relatórios, SAC/Price)<\u002Ftd><td><strong>Pedantes.<\u002Fstrong> Não exibimos complexidade. Sempre explicamos o \"porquê\"<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Opinativos.<\u002Fstrong> Defendemos uma filosofia, guiamos o usuário ativamente<\u002Ftd><td><strong>Mandões.<\u002Fstrong> Sem bronca, sem coach moralista<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Detalhistas.<\u002Fstrong> Rastreamos coisas que outros apps ignoram<\u002Ftd><td><strong>Burocráticos.<\u002Fstrong> Sem checklist infinita<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Realistas.<\u002Fstrong> A vida financeira é bagunçada e tudo bem<\u002Ftd><td><strong>Cínicos.<\u002Fstrong> Sem julgamento. Oferecemos correção<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Brasileiros sem provincianismo.<\u002Fstrong> pt-BR base, EN onde fizer sentido<\u002Ftd><td><strong>Anglo-aspiracionais.<\u002Fstrong> Sem inglês de enfeite<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Calmos.<\u002Fstrong> Finança é tema sensível, sem urgência fabricada<\u002Ftd><td><strong>Indiferentes.<\u002Fstrong> Avisamos atrasos, sugerimos ações<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fsection>\n\n\n    <!-- 03 TAGLINES -->\n    <section class=\"s\" id=\"taglines\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Identidade da marca<\u002Fdiv>\n        <h2><span class=\"num\">03<\u002Fspan>Taglines oficiais<\u002Fh2>\n        <p class=\"lede\">Três taglines com papéis diferentes. Use cada uma no contexto certo, juntas formam um sistema coerente.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"tagline\">\n        <div class=\"label\">01 · Principal · Positioning<\u002Fdiv>\n        <div class=\"copy\">Organize compromissos,<br><em>não tickets de extrato.<\u002Fem><\u002Fdiv>\n        <div class=\"usage\">Hero da homepage, materiais formais, footer, cartão de visita, embalagens, deck institucional. Posiciona contra apps que cadastram transação a transação.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"tagline\">\n        <div class=\"label\">02 · Hook de campanha<\u002Fdiv>\n        <div class=\"copy\">Você sabe quanto pode sobrar em dezembro.<br><em>Antes de dezembro chegar.<\u002Fem><\u002Fdiv>\n        <div class=\"usage\">Ads, billboards, social posts de campanha, email marketing. Versão curta: <strong style=\"color:var(--color-accent-400)\">\"Antes de dezembro chegar.\"<\u002Fstrong> Promete antecipação, sticky.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"tagline lime\">\n        <div class=\"label\">03 · Explicação do modelo<\u002Fdiv>\n        <div class=\"copy\">Comprometido <em>vs.<\u002Fem> executado.<\u002Fdiv>\n        <div class=\"usage\">Página \"Sobre\", seção \"Como funciona\", onboarding, docs internas. É a tagline desenhada no símbolo Twin Track (linha de cima = comprometido, linha de baixo = executado).<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n\n    <!-- 04 VOZ E TOM -->\n    <section class=\"s\" id=\"voz-tom\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Identidade da marca<\u002Fdiv>\n        <h2><span class=\"num\">04<\u002Fspan>Voz e tom<\u002Fh2>\n        <p class=\"lede\">A <strong>voz<\u002Fstrong> é constante (personalidade). O <strong>tom<\u002Fstrong> flexa por contexto (formalidade, energia, densidade técnica).<\u002Fp>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Princípios de voz<\u002Fh3>\n      <ol>\n        <li>Trate o usuário como adulto inteligente<\u002Fli>\n        <li>Tenha opinião<\u002Fli>\n        <li>Mostre o trabalho (quando o app fizer algo automaticamente, explique)<\u002Fli>\n        <li>Fale plural quando fizer sentido (\"vocês\", \"a gente\")<\u002Fli>\n        <li>Português de verdade, não traduzido<\u002Fli>\n        <li><strong>Sem travessões (—) em texto visível.<\u002Fstrong> Use vírgula, dois pontos ou ponto<\u002Fli>\n      <\u002Fol>\n\n      <h3 class=\"sub\">Tom por contexto<\u002Fh3>\n      <table>\n        <thead><tr><th style=\"width:24%\">Onde<\u002Fth><th style=\"width:38%\">Exemplo (escrever assim)<\u002Fth><th>Anti-padrão<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Microcopy (botão, label)<\u002Ftd><td>\"Marcar como pago\", \"Saiu de qual conta?\"<\u002Ftd><td>\"Confirmar Status do Pagamento\"<\u002Ftd><\u002Ftr>\n          <tr><td>Toast de sucesso<\u002Ftd><td>\"Pagamento marcado. Saldo atualizado.\"<\u002Ftd><td>\"Operação realizada com sucesso!\"<\u002Ftd><\u002Ftr>\n          <tr><td>Toast de erro<\u002Ftd><td>\"Câmbio USD indisponível agora, tenta de novo em alguns minutos.\"<\u002Ftd><td>\"Ops! Algo deu errado\"<\u002Ftd><\u002Ftr>\n          <tr><td>Empty state<\u002Ftd><td>\"Nenhum compromisso ainda. Comece cadastrando seu salário, o resto a gente preenche.\"<\u002Ftd><td>\"Lista vazia\"<\u002Ftd><\u002Ftr>\n          <tr><td>Email transacional<\u002Ftd><td>\"Pra trocar sua senha, clica aqui. O link vale por 1 hora.\"<\u002Ftd><td>\"Prezado usuário, segue link\"<\u002Ftd><\u002Ftr>\n          <tr><td>Landing hero<\u002Ftd><td>\"Organize compromissos, não tickets de extrato.\"<\u002Ftd><td>\"A melhor plataforma de gestão\"<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fsection>\n\n\n    <!-- 05 VOCABULÁRIO -->\n    <section class=\"s\" id=\"vocabulario\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Identidade da marca<\u002Fdiv>\n        <h2><span class=\"num\">05<\u002Fspan>Vocabulário canônico<\u002Fh2>\n        <p class=\"lede\">Termos do produto têm tradução fixa. Não invente sinônimos. Isso é um contrato entre design, copy e engenharia.<\u002Fp>\n      <\u002Fdiv>\n\n      <table>\n        <thead><tr><th>Conceito<\u002Fth><th>Termo correto<\u002Fth><th>Não usar<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Promessa recorrente<\u002Ftd><td><strong>Compromisso<\u002Fstrong><\u002Ftd><td>\"Despesa fixa\", \"lançamento\"<\u002Ftd><\u002Ftr>\n          <tr><td>Ocorrência mensal de um compromisso<\u002Ftd><td><strong>Pagamento<\u002Fstrong><\u002Ftd><td>\"Conta\", \"boleto\"<\u002Ftd><\u002Ftr>\n          <tr><td>Dinheiro saindo/entrando<\u002Ftd><td><strong>Transação<\u002Fstrong><\u002Ftd><td>\"Movimentação\", \"operação\"<\u002Ftd><\u002Ftr>\n          <tr><td>Sub-saldo numa conta<\u002Ftd><td><strong>Caixinha<\u002Fstrong><\u002Ftd><td>\"Envelope\", \"Pote\"<\u002Ftd><\u002Ftr>\n          <tr><td>Saldo livre não alocado<\u002Ftd><td><strong>Caixa Livre<\u002Fstrong><\u002Ftd><td>\"Saldo disponível\"<\u002Ftd><\u002Ftr>\n          <tr><td>Conta de onde saiu de fato<\u002Ftd><td><strong>Conta efetiva<\u002Fstrong><\u002Ftd><td>\"Origem real\"<\u002Ftd><\u002Ftr>\n          <tr><td>Bater pagamentos com extrato<\u002Ftd><td><strong>Conciliação<\u002Fstrong><\u002Ftd><td>\"Match\", \"verificação\"<\u002Ftd><\u002Ftr>\n          <tr><td>Receita antes do previsto<\u002Ftd><td><strong>Adiantamento de receita<\u002Fstrong><\u002Ftd><td>\"Antecipação\"<\u002Ftd><\u002Ftr>\n          <tr><td>Ativos menos passivos<\u002Ftd><td><strong>Patrimônio<\u002Fstrong><\u002Ftd><td>\"Net worth\", \"fortuna\"<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <h3 class=\"sub\">Vocabulário banido<\u002Fh3>\n      <ul>\n        <li>❌ <strong>\"Investidor\"<\u002Fstrong> para pessoa comum. Use \"você\"<\u002Fli>\n        <li>❌ <strong>\"Cliente\"<\u002Fstrong>. São usuários ou \"você\"<\u002Fli>\n        <li>❌ <strong>\"Robô\", \"IA\", \"inteligência artificial\".<\u002Fstrong> Somos um app determinístico bem projetado<\u002Fli>\n        <li>❌ <strong>\"Plataforma\"<\u002Fstrong> quando dá pra dizer \"app\" ou \"FinFlow\"<\u002Fli>\n        <li>❌ <strong>\"Solução\", \"Empoderar\".<\u002Fstrong> Vendedor demais<\u002Fli>\n        <li>❌ <strong>Anglicismos desnecessários<\u002Fstrong>, \"insights\", \"tracking\", \"report\"<\u002Fli>\n      <\u002Ful>\n    <\u002Fsection>\n\n\n    <!-- ════════════════════════════════════════════════ LOGO ════ -->\n\n\n    <!-- 06 CONCEITO TWIN TRACK -->\n    <section class=\"s major\" id=\"logo-conceito\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Logo<\u002Fdiv>\n        <h2><span class=\"num\">06<\u002Fspan>Twin Track. O conceito.<\u002Fh2>\n        <p class=\"lede\">Duas trilhas paralelas. A linha de cima (roxa) é o <strong>planejado<\u002Fstrong>. A linha de baixo (lime, com pico de variação) é o <strong>real<\u002Fstrong>. O símbolo é a filosofia \"comprometido vs. executado\" desenhada.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:var(--color-surface);border:1px solid var(--color-border);border-radius:14px;padding:48px;display:flex;align-items:center;justify-content:center;margin-bottom:24px\">\n        <svg viewBox=\"0 0 100 100\" width=\"280\" height=\"280\">\n          <line x1=\"14\" y1=\"32\" x2=\"86\" y2=\"32\" stroke=\"var(--color-primary-500)\" stroke-width=\"12\" stroke-linecap=\"round\"><\u002Fline>\n          <path d=\"M14 68 L38 68 L41 50 L59 50 L62 68 L86 68\" stroke=\"var(--color-accent-600)\" stroke-width=\"12\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Construção canônica<\u002Fh3>\n      <table>\n        <tbody>\n          <tr><td><code>stroke-width<\u002Fcode><\u002Ftd><td>W (variável)<\u002Ftd><\u002Ftr>\n          <tr><td>Extensão horizontal<\u002Ftd><td>6W (linha de x até x + 6W)<\u002Ftd><\u002Ftr>\n          <tr><td>Espaçamento ↕<\u002Ftd><td>3W (centro a centro entre as duas linhas)<\u002Ftd><\u002Ftr>\n          <tr><td>Visual width<\u002Ftd><td>7W<\u002Ftd><\u002Ftr>\n          <tr><td>Visual height<\u002Ftd><td>4W<\u002Ftd><\u002Ftr>\n          <tr><td>Bump tip<\u002Ftd><td>Midpoint entre as duas linhas<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n      <p>Aplicar em qualquer tamanho mantém as proporções. A variação stacked usa W menor pra equilibrar com o wordmark.<\u002Fp>\n\n      <h3 class=\"sub\">Tamanho mínimo<\u002Fh3>\n      <ul>\n        <li>Símbolo isolado: <strong>16 × 16 px<\u002Fstrong> digital, <strong>8 mm<\u002Fstrong> impresso<\u002Fli>\n        <li>Wordmark / lockup: <strong>72 px<\u002Fstrong> de altura digital, <strong>24 mm<\u002Fstrong> impresso<\u002Fli>\n      <\u002Ful>\n\n      <h3 class=\"sub\">Clear space<\u002Fh3>\n      <p>Mínimo <strong>1x<\u002Fstrong> (espessura da linha) de espaço livre em todos os lados. No lockup com wordmark, <strong>1.5x<\u002Fstrong> entre símbolo e tipo.<\u002Fp>\n    <\u002Fsection>\n\n\n    <!-- 07 VARIAÇÕES -->\n    <section class=\"s\" id=\"logo-variacoes\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Logo<\u002Fdiv>\n        <h2><span class=\"num\">07<\u002Fspan>Variações canônicas<\u002Fh2>\n        <p class=\"lede\">20 arquivos em <code>logo/<\u002Fcode>. Os 6 lockups mais usados estão abaixo.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"logo-row\">\n        <div class=\"logo-card\">\n          <div class=\"preview light\"><img src=\"0c98b64a-8324-430b-83d0-c6638bd1b3ad\" alt=\"\"><\u002Fdiv>\n          <div class=\"info\"><div class=\"name\">Lockup H · color<\u002Fdiv><div class=\"path\">★ Uso primário<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"logo-card\">\n          <div class=\"preview dark\"><img src=\"efcbdfee-1d4e-4e85-b4f9-8c89801fd755\" alt=\"\"><\u002Fdiv>\n          <div class=\"info\"><div class=\"name\">Lockup H · reverso<\u002Fdiv><div class=\"path\">Sobre dark<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"logo-card\">\n          <div class=\"preview roxo\"><img src=\"32e0b983-d55b-4ac0-b9ee-611572c24577\" alt=\"\"><\u002Fdiv>\n          <div class=\"info\"><div class=\"name\">Lockup H · mono light<\u002Fdiv><div class=\"path\">Sobre roxo<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"logo-card\">\n          <div class=\"preview light\"><img src=\"d5e113ad-4591-40b4-aa3c-f781f461ec78\" alt=\"\"><\u002Fdiv>\n          <div class=\"info\"><div class=\"name\">Símbolo · color<\u002Fdiv><div class=\"path\">Avatar quadrado<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"logo-card\">\n          <div class=\"preview light\"><img src=\"34cb49b1-1ff4-41c4-872e-1f5f60702010\" alt=\"\" style=\"border-radius:18%\"><\u002Fdiv>\n          <div class=\"info\"><div class=\"name\">App icon · dark bg<\u002Fdiv><div class=\"path\">iOS / Android<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"logo-card\">\n          <div class=\"preview light\" style=\"background:white\"><img src=\"7e4edd16-14fb-48c0-82bb-5dc09e83c2ed\" alt=\"\"><\u002Fdiv>\n          <div class=\"info\"><div class=\"name\">Wordmark · color<\u002Fdiv><div class=\"path\">Sem símbolo<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"font-size:13px;color:var(--color-ink-600);margin-top:16px\">\n        <strong>Família completa em <code>logo/<\u002Fcode><\u002Fstrong>: símbolo (4 versões), wordmark (3), lockup horizontal (4), lockup empilhado (3), app icon (3), favicon (2). Detalhes em <code>logo/README.md<\u002Fcode>.\n      <\u002Fp>\n    <\u002Fsection>\n\n\n    <!-- 08 O QUE NÃO FAZER -->\n    <section class=\"s\" id=\"logo-dont\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Logo<\u002Fdiv>\n        <h2><span class=\"num\">08<\u002Fspan>O que não fazer<\u002Fh2>\n      <\u002Fdiv>\n\n      <div class=\"do-dont\">\n        <div class=\"card no\"><div class=\"lbl\">❌ Não<\u002Fdiv>Rotacionar a marca. A horizontalidade é parte do significado.<\u002Fdiv>\n        <div class=\"card no\"><div class=\"lbl\">❌ Não<\u002Fdiv>Esticar ou distorcer. Sempre escalar uniforme.<\u002Fdiv>\n        <div class=\"card no\"><div class=\"lbl\">❌ Não<\u002Fdiv>Trocar as cores fora das aprovadas (roxo, lime, mono).<\u002Fdiv>\n        <div class=\"card no\"><div class=\"lbl\">❌ Não<\u002Fdiv>Aplicar sombras decorativas ou outlines extras.<\u002Fdiv>\n        <div class=\"card no\"><div class=\"lbl\">❌ Não<\u002Fdiv>Usar gradientes inventados. Só o oficial (roxo → lime).<\u002Fdiv>\n        <div class=\"card no\"><div class=\"lbl\">❌ Não<\u002Fdiv>Trocar a fonte do wordmark. É sempre Manrope ExtraBold.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n\n    <!-- ════════════════════════════════════════════════ SISTEMA VISUAL ════ -->\n\n\n    <!-- 09 CORES -->\n    <section class=\"s major\" id=\"cores\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Sistema visual<\u002Fdiv>\n        <h2><span class=\"num\">09<\u002Fspan>Cores<\u002Fh2>\n        <p class=\"lede\">Toda cor tem trabalho. Roxo = ação primária. Lime = acento. Verde = sucesso. Âmbar = pendente. Nenhuma cor \"só pra ficar bonito\".<\u002Fp>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Primária · Roxo Tech<\u002Fh3>\n      <div class=\"ramp\">\n        <div class=\"stop\" style=\"background:var(--color-primary-50);color:var(--color-primary-900)\">50<br>#F1EFFE<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-primary-100);color:var(--color-primary-900)\">100<br>#E5E1FD<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-primary-200);color:var(--color-primary-900)\">200<br>#D2CCFB<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-primary-300);color:var(--color-primary-900)\">300<br>#B5ACF8<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-primary-400);color:white\">400<br>#8B7FF7<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-primary-500);color:white\">★ 500<br>#6D5EF5<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-primary-600);color:white\">600<br>#5B4FE0<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-primary-700);color:white\">700<br>#4B3FD6<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-primary-800);color:white\">800<br>#3A30B0<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-primary-900);color:white\">900<br>#2A2384<\u002Fdiv>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Acento · Lime<\u002Fh3>\n      <div class=\"ramp\">\n        <div class=\"stop\" style=\"background:var(--color-accent-50);color:#2E460B\">50<br>#F7FEE7<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-accent-100);color:#2E460B\">100<br>#ECFCCB<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-accent-200);color:#2E460B\">200<br>#DFFBA5<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-accent-300);color:#2E460B\">300<br>#D2F873<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-accent-400);color:#2E460B\">★ 400<br>#C2F542<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-accent-500);color:white\">500<br>#A3D331<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-accent-600);color:white\">600<br>#84B121<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-accent-700);color:white\">700<br>#65880F<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-accent-800);color:white\">800<br>#4D6A0E<\u002Fdiv>\n        <div class=\"stop\" style=\"background:var(--color-accent-900);color:white\">900<br>#2E460B<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"note warning\">\n        <strong>Cuidado:<\u002Fstrong> em fundo claro, lime não tem contraste suficiente para texto. Use <code>accent-600<\u002Fcode> ou <code>accent-700<\u002Fcode>. Em fundo escuro, o <code>accent-400<\u002Fcode> brilha.\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Semânticas<\u002Fh3>\n      <div class=\"status-badges\">\n        <span style=\"background:var(--color-success-bg);color:var(--color-success-text)\">Sucesso<\u002Fspan>\n        <span style=\"background:var(--color-warning-bg);color:var(--color-warning-text)\">Atenção<\u002Fspan>\n        <span style=\"background:var(--color-danger-bg);color:var(--color-danger-text)\">Erro<\u002Fspan>\n        <span style=\"background:var(--color-info-bg);color:var(--color-info-text)\">Info<\u002Fspan>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Sidebar (sempre dark)<\u002Fh3>\n      <p>Decisão de marca, a sidebar fica escura nos dois modos. Light usa <code>#0F172A<\u002Fcode>, dark usa <code>#14172A<\u002Fcode> (leve tom roxo).<\u002Fp>\n    <\u002Fsection>\n\n\n    <!-- 10 STATUS -->\n    <section class=\"s\" id=\"status\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Sistema visual<\u002Fdiv>\n        <h2><span class=\"num\">10<\u002Fspan>Status de pagamento<\u002Fh2>\n        <p class=\"lede\">5 status, cada um numa família cromática distinta. O usuário lê a tabela sem ler.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"status-badges\" style=\"margin:24px 0\">\n        <span class=\"b-pago\">Pago<\u002Fspan>\n        <span class=\"b-trans\">Transferido<\u002Fspan>\n        <span class=\"b-transferir\">A Transferir<\u002Fspan>\n        <span class=\"b-cancel\">Cancelado<\u002Fspan>\n        <span class=\"b-pagar\">A Pagar<\u002Fspan>\n      <\u002Fdiv>\n\n      <table>\n        <thead><tr><th>Status<\u002Fth><th>Vibe<\u002Fth><th>Quando<\u002Fth><th>Token<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><strong>Pago<\u002Fstrong><\u002Ftd><td>🟢 Verde · sucesso<\u002Ftd><td>Pagamento concluído<\u002Ftd><td><code>status-pago<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td><strong>Transferido<\u002Fstrong><\u002Ftd><td>🔵 Azul · fluxo<\u002Ftd><td>Transferência executada<\u002Ftd><td><code>status-transferido<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td><strong>A Transferir<\u002Fstrong><\u002Ftd><td>🌸 Rose · pendente<\u002Ftd><td>Marcada mas não executada<\u002Ftd><td><code>status-transferir<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td><strong>Cancelado<\u002Fstrong><\u002Ftd><td>⚫ Cinza · neutralizado<\u002Ftd><td>Não vai acontecer<\u002Ftd><td><code>status-cancelado<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td><strong>A Pagar<\u002Fstrong><\u002Ftd><td>🟡 Âmbar · atenção<\u002Ftd><td>Default, precisa ação<\u002Ftd><td><code>status-apagar<\u002Fcode><\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <div class=\"note\">\n        <strong>Removidos na v2.0:<\u002Fstrong> Cartão, Parcial e Agendado não existem mais no sistema.\n      <\u002Fdiv>\n    <\u002Fsection>\n\n\n    <!-- 11 TIPOGRAFIA -->\n    <section class=\"s\" id=\"tipografia\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Sistema visual<\u002Fdiv>\n        <h2><span class=\"num\">11<\u002Fspan>Tipografia<\u002Fh2>\n        <p class=\"lede\">Manrope (display) + Inter (body) + Geist Mono (tabular). Cada uma com papel claro.<\u002Fp>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Três famílias<\u002Fh3>\n      <table>\n        <thead><tr><th>Token<\u002Fth><th>Família<\u002Fth><th>Uso<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><code>--font-display<\u002Fcode><\u002Ftd><td><strong>Manrope<\u002Fstrong><\u002Ftd><td>h1 a h5, KPIs, headlines, wordmark<\u002Ftd><\u002Ftr>\n          <tr><td><code>--font-body<\u002Fcode><\u002Ftd><td><strong>Inter<\u002Fstrong><\u002Ftd><td>Body, labels, inputs, tabelas<\u002Ftd><\u002Ftr>\n          <tr><td><code>--font-mono<\u002Fcode><\u002Ftd><td><strong>Geist Mono<\u002Fstrong><\u002Ftd><td>Valores monetários, datas, código<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <h3 class=\"sub\">Escala<\u002Fh3>\n      <div class=\"type-table\">\n        <div class=\"type-row\"><span class=\"tok\">--fs-5xl<\u002Fspan><span class=\"px\">60px<\u002Fspan><span class=\"sample\" style=\"font-size:48px;font-weight:800;letter-spacing:-0.03em\">Display<\u002Fspan><\u002Fdiv>\n        <div class=\"type-row\"><span class=\"tok\">--fs-3xl<\u002Fspan><span class=\"px\">36px<\u002Fspan><span class=\"sample\" style=\"font-size:32px;font-weight:700;letter-spacing:-0.02em\">H1 · página<\u002Fspan><\u002Fdiv>\n        <div class=\"type-row\"><span class=\"tok\">--fs-2xl<\u002Fspan><span class=\"px\">30px<\u002Fspan><span class=\"sample\" style=\"font-size:26px;font-weight:700;letter-spacing:-0.015em\">H2 · seção<\u002Fspan><\u002Fdiv>\n        <div class=\"type-row\"><span class=\"tok\">--fs-xl<\u002Fspan><span class=\"px\">24px<\u002Fspan><span class=\"sample\" style=\"font-size:22px;font-weight:700\">H3 · sub-seção<\u002Fspan><\u002Fdiv>\n        <div class=\"type-row\"><span class=\"tok\">--fs-base<\u002Fspan><span class=\"px\">16px ★<\u002Fspan><span class=\"sample\" style=\"font-size:16px;font-family:var(--font-body)\">Body padrão · Inter<\u002Fspan><\u002Fdiv>\n        <div class=\"type-row\"><span class=\"tok\">--fs-sm<\u002Fspan><span class=\"px\">14px<\u002Fspan><span class=\"sample\" style=\"font-size:14px;font-family:var(--font-body);color:var(--color-ink-600)\">Tabela, secundário<\u002Fspan><\u002Fdiv>\n        <div class=\"type-row\"><span class=\"tok\">--fs-xs<\u002Fspan><span class=\"px\">12px<\u002Fspan><span class=\"sample\" style=\"font-size:12px;font-family:var(--font-body);text-transform:uppercase;letter-spacing:0.1em;color:var(--color-ink-500)\">Eyebrow · badges<\u002Fspan><\u002Fdiv>\n        <div class=\"type-row\"><span class=\"tok\">tabular<\u002Fspan><span class=\"px\">~<\u002Fspan><span class=\"sample\" style=\"font-family:var(--font-mono);font-size:18px;font-variant-numeric:tabular-nums\">R$ 1.234,56 → R$ 9.999,99<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"note\">\n        <strong>Tabular nums é crítico para finanças.<\u002Fstrong> Use <code>font-variant-numeric: tabular-nums<\u002Fcode> em toda coluna de valores monetários. Sem isso \"1.234,56\" e \"9.999,99\" não alinham na vertical.\n      <\u002Fdiv>\n    <\u002Fsection>\n\n\n    <!-- 12 ESPAÇAMENTO + RADIUS -->\n    <section class=\"s\" id=\"espacamento\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Sistema visual<\u002Fdiv>\n        <h2><span class=\"num\">12<\u002Fspan>Espaçamento e radius<\u002Fh2>\n        <p class=\"lede\">Escala de 4px (Tailwind-style). Curvas médias a generosas.<\u002Fp>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Espaçamento<\u002Fh3>\n      <p>Tokens <code>--space-0<\u002Fcode> a <code>--space-24<\u002Fcode> (de 0 a 96px). Regra: prefira a escala. Não invente <code>padding: 17px<\u002Fcode>.<\u002Fp>\n\n      <h3 class=\"sub\">Border radius<\u002Fh3>\n      <div class=\"swatches\">\n        <div class=\"swatch\"><div class=\"chip\" style=\"background:var(--color-primary-500);border-radius:var(--radius-sm)\"><\u002Fdiv><div class=\"info\"><div class=\"name\">Small · 6px<\u002Fdiv><div class=\"var\">--radius-sm<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"swatch\"><div class=\"chip\" style=\"background:var(--color-primary-500);border-radius:var(--radius-md)\"><\u002Fdiv><div class=\"info\"><div class=\"name\">Medium ★ · 12px<\u002Fdiv><div class=\"var\">--radius-md<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"swatch\"><div class=\"chip\" style=\"background:var(--color-primary-500);border-radius:var(--radius-lg)\"><\u002Fdiv><div class=\"info\"><div class=\"name\">Large · 20px<\u002Fdiv><div class=\"var\">--radius-lg<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"swatch\"><div class=\"chip\" style=\"background:var(--color-primary-500);border-radius:var(--radius-xl)\"><\u002Fdiv><div class=\"info\"><div class=\"name\">Extra · 28px<\u002Fdiv><div class=\"var\">--radius-xl<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n\n    <!-- 13 SOMBRAS + GRADIENTES -->\n    <section class=\"s\" id=\"sombras\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Sistema visual<\u002Fdiv>\n        <h2><span class=\"num\">13<\u002Fspan>Sombras e gradientes<\u002Fh2>\n        <p class=\"lede\">6 níveis de sombra com assinatura roxa sutil. 4 gradientes oficiais.<\u002Fp>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Sombras<\u002Fh3>\n      <p>A segunda camada do <code>--shadow-card<\u002Fcode> usa roxo translúcido em vez de cinza, dando uma aura sutil que conecta com a cor primária.<\u002Fp>\n\n      <h3 class=\"sub\">Gradientes<\u002Fh3>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:16px 0\">\n        <div style=\"background:var(--gradient-primary);height:120px;border-radius:10px;padding:20px;color:white;display:flex;align-items:end;font-family:var(--font-mono);font-size:11px\">--gradient-primary<\u002Fdiv>\n        <div style=\"background:var(--gradient-hero);height:120px;border-radius:10px;padding:20px;color:white;display:flex;align-items:end;font-family:var(--font-mono);font-size:11px\">--gradient-hero<\u002Fdiv>\n        <div style=\"background:var(--gradient-primary-soft);height:120px;border-radius:10px;padding:20px;color:var(--color-ink-900);display:flex;align-items:end;font-family:var(--font-mono);font-size:11px\">--gradient-primary-soft<\u002Fdiv>\n        <div style=\"background:var(--gradient-night);height:120px;border-radius:10px;padding:20px;color:white;display:flex;align-items:end;font-family:var(--font-mono);font-size:11px\">--gradient-night<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"note warning\">\n        <strong>Não inventar gradientes novos.<\u002Fstrong> Mantenha consistência.\n      <\u002Fdiv>\n    <\u002Fsection>\n\n\n    <!-- 14 TEMA -->\n    <section class=\"s\" id=\"tema\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Sistema visual<\u002Fdiv>\n        <h2><span class=\"num\">14<\u002Fspan>Light e dark mode<\u002Fh2>\n        <p class=\"lede\">Ambos os modos são first-class. Não tem \"dark mode adaptado\". Os tokens invertem automaticamente via <code>data-theme=\"dark\"<\u002Fcode>.<\u002Fp>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Como ativar<\u002Fh3>\n<pre style=\"background:var(--color-ink-900);color:var(--color-ink-100);padding:16px 20px;border-radius:10px;overflow-x:auto;font-family:var(--font-mono);font-size:12px;line-height:1.65\"><code style=\"background:none;color:inherit;padding:0\">document.documentElement.setAttribute('data-theme', 'dark');\n<span style=\"color:var(--color-ink-500)\">// ou 'light'<\u002Fspan><\u002Fcode><\u002Fpre>\n\n      <h3 class=\"sub\">Que invertem<\u002Fh3>\n      <ul>\n        <li>Surfaces (paper, canvas)<\u002Fli>\n        <li>Ink ramp inteira (50 a 900)<\u002Fli>\n        <li>Bgs sutis de marca (primary-50, accent-50)<\u002Fli>\n        <li>Semânticas (bg + text juntos)<\u002Fli>\n        <li>Status de pagamento (bg + text juntos)<\u002Fli>\n      <\u002Ful>\n\n      <h3 class=\"sub\">Que não invertem<\u002Fh3>\n      <ul>\n        <li>Sidebar (sempre dark, com tom diferente em cada modo)<\u002Fli>\n        <li>Hero / seções always-dark (mantêm ink-950)<\u002Fli>\n        <li>Final CTA em lime (sempre lime)<\u002Fli>\n        <li>Fixed tokens (<code>--fixed-white<\u002Fcode>, <code>--fixed-dark<\u002Fcode>)<\u002Fli>\n        <li>Logo principal<\u002Fli>\n      <\u002Ful>\n    <\u002Fsection>\n\n\n    <!-- ════════════════════════════════════════════ DEVELOPER ════ -->\n\n\n    <!-- 15 TOKENS -->\n    <section class=\"s major\" id=\"tokens\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Para desenvolvedores<\u002Fdiv>\n        <h2><span class=\"num\">15<\u002Fspan>Tokens CSS<\u002Fh2>\n        <p class=\"lede\">Importa <code>src/css/variables.css<\u002Fcode> e usa <code>var(--token)<\u002Fcode>. Nunca hex hardcoded.<\u002Fp>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Bom<\u002Fh3>\n<pre style=\"background:var(--color-ink-900);color:var(--color-ink-100);padding:16px 20px;border-radius:10px;overflow-x:auto;font-family:var(--font-mono);font-size:12px;line-height:1.65\"><code style=\"background:none;color:inherit;padding:0\">.my-card {\n  background: <span style=\"color:var(--color-accent-300)\">var(--color-surface)<\u002Fspan>;\n  border: 1px solid <span style=\"color:var(--color-accent-300)\">var(--color-border)<\u002Fspan>;\n  border-radius: <span style=\"color:var(--color-accent-300)\">var(--radius-md)<\u002Fspan>;\n  padding: <span style=\"color:var(--color-accent-300)\">var(--space-5)<\u002Fspan>;\n  box-shadow: <span style=\"color:var(--color-accent-300)\">var(--shadow-card)<\u002Fspan>;\n  color: <span style=\"color:var(--color-accent-300)\">var(--color-text-main)<\u002Fspan>;\n}<\u002Fcode><\u002Fpre>\n\n      <h3 class=\"sub\">Ruim<\u002Fh3>\n<pre style=\"background:var(--color-ink-900);color:var(--color-ink-100);padding:16px 20px;border-radius:10px;overflow-x:auto;font-family:var(--font-mono);font-size:12px;line-height:1.65\"><code style=\"background:none;color:inherit;padding:0\">.my-card {\n  background: <span style=\"color:#FCA5A5\">#FFFFFF<\u002Fspan>;   <span style=\"color:var(--color-ink-500)\">/* hardcoded */<\u002Fspan>\n  border-radius: <span style=\"color:#FCA5A5\">12px<\u002Fspan>;     <span style=\"color:var(--color-ink-500)\">/* hardcoded */<\u002Fspan>\n}<\u002Fcode><\u002Fpre>\n\n      <h3 class=\"sub\">Quando criar token novo<\u002Fh3>\n      <ul>\n        <li>Vai ser usado em <strong>3 ou mais lugares<\u002Fstrong><\u002Fli>\n        <li>Não cabe em token existente<\u002Fli>\n        <li>Tem nome semântico (não <code>--cor-bonita<\u002Fcode>)<\u002Fli>\n      <\u002Ful>\n    <\u002Fsection>\n\n\n    <!-- 16 COMPONENTES -->\n    <section class=\"s\" id=\"componentes\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Para desenvolvedores<\u002Fdiv>\n        <h2><span class=\"num\">16<\u002Fspan>Componentes base<\u002Fh2>\n        <p class=\"lede\">Exemplos prontos. Copia-cola pra prototipagem rápida.<\u002Fp>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Botões<\u002Fh3>\n      <div class=\"btn-row\">\n        <button class=\"demo-btn demo-btn-primary\">Primário<\u002Fbutton>\n        <button class=\"demo-btn demo-btn-lime\">Lime · CTA forte<\u002Fbutton>\n        <button class=\"demo-btn demo-btn-ghost\">Ghost<\u002Fbutton>\n        <button class=\"demo-btn demo-btn-danger\">Destrutivo<\u002Fbutton>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Status badges<\u002Fh3>\n      <div class=\"status-badges\">\n        <span class=\"b-pago\">Pago<\u002Fspan>\n        <span class=\"b-trans\">Transferido<\u002Fspan>\n        <span class=\"b-transferir\">A Transferir<\u002Fspan>\n        <span class=\"b-cancel\">Cancelado<\u002Fspan>\n        <span class=\"b-pagar\">A Pagar<\u002Fspan>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Card padrão<\u002Fh3>\n      <div style=\"background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:20px;box-shadow:var(--shadow-card);max-width:360px;margin:16px 0\">\n        <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--color-ink-500);font-weight:600;margin-bottom:4px\">Saldo total<\u002Fdiv>\n        <div style=\"font-family:var(--font-display);font-weight:800;font-size:28px;font-variant-numeric:tabular-nums;letter-spacing:-0.02em\">R$ 28.450,12<\u002Fdiv>\n        <div style=\"font-size:12px;color:var(--color-success);margin-top:4px\">↑ R$ 1.240 vs mês passado<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n\n    <!-- 17 ACESSIBILIDADE -->\n    <section class=\"s\" id=\"acessibilidade\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Para desenvolvedores<\u002Fdiv>\n        <h2><span class=\"num\">17<\u002Fspan>Acessibilidade<\u002Fh2>\n        <p class=\"lede\">WCAG AA é piso, não teto.<\u002Fp>\n      <\u002Fdiv>\n\n      <ul>\n        <li><strong>Contraste<\u002Fstrong>, todas cores atingem AA. Em texto pequeno, prefira tokens 700+ sobre fundos claros<\u002Fli>\n        <li><strong>Focus ring<\u002Fstrong>, sempre <code>:focus-visible<\u002Fcode> com 2px solid + 2px offset<\u002Fli>\n        <li><strong>Tamanhos mínimos<\u002Fstrong>, botão 36px height (44px em touch), tap target 44 × 44px, fonte mínima 12px (16px no body)<\u002Fli>\n        <li><strong>Reduced motion<\u002Fstrong>, já incluído em <code>variables.css<\u002Fcode> v2.0<\u002Fli>\n        <li><strong>Tabular nums<\u002Fstrong>, em toda coluna de números<\u002Fli>\n      <\u002Ful>\n    <\u002Fsection>\n\n\n    <!-- ════════════════════════════════════════════ MARKETING ════ -->\n\n\n    <!-- 18 APLICAÇÕES -->\n    <section class=\"s major\" id=\"aplicacoes\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Para marketing<\u002Fdiv>\n        <h2><span class=\"num\">18<\u002Fspan>Aplicações da marca<\u002Fh2>\n        <p class=\"lede\">Onde a marca aparece e como ela se comporta em cada superfície.<\u002Fp>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Hierarquia de aplicação<\u002Fh3>\n      <table>\n        <thead><tr><th>Superfície<\u002Fth><th>Logo<\u002Fth><th>Tagline<\u002Fth><th>Emoji?<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Landing hero<\u002Ftd><td>Wordmark + símbolo<\u002Ftd><td>01 (Positioning)<\u002Ftd><td>❌<\u002Ftd><\u002Ftr>\n          <tr><td>Billboard / OOH<\u002Ftd><td>Símbolo + nome<\u002Ftd><td>02 short (\"Antes de dezembro chegar\")<\u002Ftd><td>❌<\u002Ftd><\u002Ftr>\n          <tr><td>Email transacional<\u002Ftd><td>Lockup color<\u002Ftd><td>nenhuma<\u002Ftd><td>1 funcional<\u002Ftd><\u002Ftr>\n          <tr><td>Email marketing<\u002Ftd><td>Lockup color<\u002Ftd><td>02 ou contextual<\u002Ftd><td>até 2<\u002Ftd><\u002Ftr>\n          <tr><td>Social (IG/LinkedIn)<\u002Ftd><td>Wordmark inline<\u002Ftd><td>02 ou contextual<\u002Ftd><td>contextual<\u002Ftd><\u002Ftr>\n          <tr><td>App icon<\u002Ftd><td>app-icon-dark-bg<\u002Ftd><td>nenhuma<\u002Ftd><td>n/a<\u002Ftd><\u002Ftr>\n          <tr><td>Splash screen<\u002Ftd><td>Símbolo + nome em gradient hero<\u002Ftd><td>nenhuma<\u002Ftd><td>n/a<\u002Ftd><\u002Ftr>\n          <tr><td>Página \"Sobre\"<\u002Ftd><td>Lockup color<\u002Ftd><td>03 (\"Comprometido vs. executado\")<\u002Ftd><td>❌<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <h3 class=\"sub\">Combinações de fundo<\u002Fh3>\n      <ul>\n        <li><strong>Fundo branco/cream<\u002Fstrong>, logo color (roxo + lime)<\u002Fli>\n        <li><strong>Fundo ink-950 (dark)<\u002Fstrong>, logo reverso (branco + lime)<\u002Fli>\n        <li><strong>Fundo roxo<\u002Fstrong>, logo mono light (branco)<\u002Fli>\n        <li><strong>Fundo lime<\u002Fstrong>, logo mono dark (ink-900)<\u002Fli>\n      <\u002Ful>\n    <\u002Fsection>\n\n\n    <!-- 19 DO / DON'T DE COPY -->\n    <section class=\"s\" id=\"do-dont-copy\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Para marketing<\u002Fdiv>\n        <h2><span class=\"num\">19<\u002Fspan>Do/Don't de copy<\u002Fh2>\n        <p class=\"lede\">Exemplos lado a lado. Use como referência rápida em revisão de copy.<\u002Fp>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Erros e problemas<\u002Fh3>\n      <div class=\"do-dont\">\n        <div class=\"card no\"><div class=\"lbl\">❌ Não escrever<\u002Fdiv>\"Ops! Algo deu errado.\"<\u002Fdiv>\n        <div class=\"card yes\"><div class=\"lbl\">✅ Escrever<\u002Fdiv>\"Câmbio USD indisponível agora, tenta de novo em alguns minutos.\"<\u002Fdiv>\n\n        <div class=\"card no\"><div class=\"lbl\">❌ Não escrever<\u002Fdiv>\"Sucesso!\"<\u002Fdiv>\n        <div class=\"card yes\"><div class=\"lbl\">✅ Escrever<\u002Fdiv>\"Pagamento marcado como Pago. Transação criada no Itaú.\"<\u002Fdiv>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Pedindo decisão<\u002Fh3>\n      <div class=\"do-dont\">\n        <div class=\"card no\"><div class=\"lbl\">❌ Não escrever<\u002Fdiv>\"Tem certeza?\"<\u002Fdiv>\n        <div class=\"card yes\"><div class=\"lbl\">✅ Escrever<\u002Fdiv>\"Excluir esse compromisso vai cancelar os 12 pagamentos futuros que ainda não rolaram. OK?\"<\u002Fdiv>\n\n        <div class=\"card no\"><div class=\"lbl\">❌ Não escrever<\u002Fdiv>\"Selecione uma opção:\"<\u002Fdiv>\n        <div class=\"card yes\"><div class=\"lbl\">✅ Escrever<\u002Fdiv>\"Saiu de qual conta?\"<\u002Fdiv>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Marketing e landing<\u002Fh3>\n      <div class=\"do-dont\">\n        <div class=\"card no\"><div class=\"lbl\">❌ Não escrever<\u002Fdiv>\"A plataforma definitiva de gestão financeira.\"<\u002Fdiv>\n        <div class=\"card yes\"><div class=\"lbl\">✅ Escrever<\u002Fdiv>\"Pare de cadastrar transação por transação. Cadastre compromissos.\"<\u002Fdiv>\n\n        <div class=\"card no\"><div class=\"lbl\">❌ Não escrever<\u002Fdiv>\"AI-powered insights.\"<\u002Fdiv>\n        <div class=\"card yes\"><div class=\"lbl\">✅ Escrever<\u002Fdiv>\"23 relatórios que mostram pra onde seu dinheiro foi, e pra onde vai.\"<\u002Fdiv>\n\n        <div class=\"card no\"><div class=\"lbl\">❌ Não escrever<\u002Fdiv>\"Empoderamos sua vida financeira.\"<\u002Fdiv>\n        <div class=\"card yes\"><div class=\"lbl\">✅ Escrever<\u002Fdiv>\"Você sabe quanto pode sobrar em dezembro. Antes de dezembro chegar.\"<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n\n    <!-- ════════════════════════════════════════════ RECURSOS ════ -->\n\n\n    <!-- 20 RECURSOS -->\n    <section class=\"s major\" id=\"arquivos\">\n      <div class=\"s-head\">\n        <div class=\"eyebrow\">Recursos<\u002Fdiv>\n        <h2><span class=\"num\">20<\u002Fspan>Arquivos, links e contatos<\u002Fh2>\n      <\u002Fdiv>\n\n      <table>\n        <thead><tr><th>Recurso<\u002Fth><th>Local<\u002Fth><th>Quando usar<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><strong>Logo pack completo<\u002Fstrong> (20 SVGs)<\u002Ftd><td><code>logo/<\u002Fcode><\u002Ftd><td>Sempre que precisar de logo/símbolo. Inclui README com instruções.<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Tokens CSS<\u002Fstrong><\u002Ftd><td><code>src/css/variables.css<\u002Fcode><\u002Ftd><td>Importar no produto. Light + dark mode automático.<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Tokens Inspector<\u002Fstrong><\u002Ftd><td><code>Tokens Inspector.html<\u002Fcode><\u002Ftd><td>Visualizar todos os tokens ao vivo. Útil em design review.<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Logo Contact Sheet<\u002Fstrong><\u002Ftd><td><code>Logo Contact Sheet.html<\u002Fcode><\u002Ftd><td>Folha de contato com todas as variações de logo.<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Landing page<\u002Fstrong><\u002Ftd><td><code>FinFlow Landing.html<\u002Fcode><\u002Ftd><td>Referência da marca aplicada em página completa.<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Brand Book (deck)<\u002Fstrong><\u002Ftd><td><code>FinFlow Brand Book - Roxo Lime.html<\u002Fcode><\u002Ftd><td>Apresentação formal de 22 slides.<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Tagline Lab<\u002Fstrong><\u002Ftd><td><code>Tagline Lab.html<\u002Fcode><\u002Ftd><td>4 candidatas iniciais aplicadas em contexto (histórico).<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Identidade verbal<\u002Fstrong><\u002Ftd><td><code>docs/BRAND.md<\u002Fcode> v1.2<\u002Ftd><td>Voz, tom, vocabulário, decisões fechadas.<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Identidade visual<\u002Fstrong><\u002Ftd><td><code>docs/VISUAL.md<\u002Fcode> v2.0<\u002Ftd><td>Sistema visual completo em markdown.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <h3 class=\"sub\">Como exportar este guia<\u002Fh3>\n      <ul>\n        <li><strong>PDF<\u002Fstrong>, clica em \"Exportar como PDF\" na sidebar (ou Cmd+P → Salvar como PDF)<\u002Fli>\n        <li><strong>HTML standalone<\u002Fstrong>, pede pra eu rodar o bundler (gera arquivo único auto-contido pra enviar por email/Slack)<\u002Fli>\n        <li><strong>Markdown<\u002Fstrong>, os arquivos em <code>docs/<\u002Fcode> são markdown editável<\u002Fli>\n      <\u002Ful>\n    <\u002Fsection>\n\n\n    <!-- Footer -->\n    <div class=\"doc-footer\">\n      <span>FinFlow · Brand &amp; Visual Guide · v1.0<\u002Fspan>\n      <span>22 mai 2026 · Roxo Tech + Lime<\u002Fspan>\n    <\u002Fdiv>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n<script>\nfunction toggleTheme() {\n  const root = document.documentElement;\n  const current = root.getAttribute('data-theme');\n  const next = current === 'dark' ? 'light' : 'dark';\n  root.setAttribute('data-theme', next);\n  localStorage.setItem('finflow-theme', next);\n}\n\n// Restore theme\n(function() {\n  const stored = localStorage.getItem('finflow-theme');\n  if (stored) document.documentElement.setAttribute('data-theme', stored);\n})();\n\n// Highlight active TOC link on scroll\n(function() {\n  const links = document.querySelectorAll('.toc a');\n  const sections = [...document.querySelectorAll('section.s')];\n  function update() {\n    let active = sections[0];\n    for (const s of sections) {\n      if (s.getBoundingClientRect().top < 100) active = s;\n    }\n    links.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + active.id));\n  }\n  window.addEventListener('scroll', update, { passive: true });\n  update();\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
