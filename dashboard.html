<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Dashboard · FinFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/variables.css">
  <link rel="stylesheet" href="src/css/global.css">
  <link rel="stylesheet" href="src/css/components.css">
  <link rel="stylesheet" href="src/css/layout.css">
</head>
<body>
  <div class="app-shell">
    <div class="app-sidebar" id="sidebar-container"></div>

    <header class="app-header header">
      <div class="header-left">
        <h2 class="header-title">Dashboard</h2>
      </div>
      <div class="header-right">
        <button type="button" class="btn btn-ghost btn-sm" id="btn-personalizar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          Personalizar
        </button>
      </div>
    </header>

    <main class="app-main main">
      <!-- Saudação -->
      <div class="page-header">
        <div class="page-header-content">
          <p class="page-eyebrow" id="dash-eyebrow">—</p>
          <h1 class="page-title" id="dash-greeting">Olá</h1>
          <p class="page-description" id="dash-month-label">Carregando…</p>
        </div>
      </div>

      <!-- Barra de edição (visível apenas no modo personalizar) -->
      <div id="dash-edit-bar" class="dash-edit-bar hidden">
        <div class="dash-edit-bar-info">
          <div class="dash-edit-bar-title">Personalizando dashboard</div>
          <div class="dash-edit-bar-hint">Arraste para reordenar · Altere o tamanho · Oculte o que não precisar</div>
        </div>
        <div id="dash-hidden-widgets" class="dash-hidden-widgets"></div>
        <button type="button" class="btn btn-primary btn-sm" id="btn-edit-done">Concluído</button>
      </div>

      <!-- Canvas de widgets (JS popula) -->
      <div id="dash-canvas" class="dash-canvas"></div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="src/js/pages/dashboard.js"></script>
</body>
</html>
