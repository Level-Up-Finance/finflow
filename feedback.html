<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback · FinFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/variables.css">
  <link rel="stylesheet" href="src/css/global.css">
  <link rel="stylesheet" href="src/css/components.css">
  <link rel="stylesheet" href="src/css/layout.css">
</head>
<body>
  <div class="app-shell">
    <div class="app-sidebar" id="sidebar-container"></div>

    <header class="app-header header">
      <div class="header-left">
        <h2 class="header-title">Feedback</h2>
      </div>
    </header>

    <main class="app-main main">
      <div class="page-header">
        <div class="page-header-content">
          <p class="page-eyebrow">Ajuda</p>
          <h1 class="page-title">Sugestões & Bugs</h1>
          <p class="page-description">Encontrou um bug, tem uma ideia, ou quer sugerir uma funcionalidade nova? Manda aqui — vou ler tudo.</p>
        </div>
      </div>

      <div class="feedback-layout">
        <!-- ============================================================
             SEÇÃO: Form
             ============================================================ -->
        <section class="feedback-section feedback-section--form">
          <header class="feedback-section-header">
            <h2 class="feedback-section-title">Nova entrada</h2>
          </header>

          <form id="form-feedback" class="feedback-form" autocomplete="off">
            <div class="field">
              <label class="field-label">Tipo</label>
              <div class="feedback-type-options">
                <label class="feedback-type-option">
                  <input type="radio" name="type" value="bug">
                  <span class="feedback-type-pill feedback-type-pill--bug">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="m8 2 1.88 1.88"/><path d="M14.12 3.88 16 2"/><path d="M9 7.13v-1a3.003 3.003 0 1 1 6 0v1"/><path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6"/><path d="M12 20v-9"/><path d="M6.53 9C4.6 8.8 3 7.1 3 5"/><path d="M6 13H2"/><path d="M3 21c0-2.1 1.7-3.9 3.8-4"/><path d="M20.97 5c0 2.1-1.6 3.8-3.5 4"/><path d="M22 13h-4"/><path d="M17.2 17c2.1.1 3.8 1.9 3.8 4"/></svg>
                    Bug
                  </span>
                </label>
                <label class="feedback-type-option">
                  <input type="radio" name="type" value="sugestao" checked>
                  <span class="feedback-type-pill feedback-type-pill--sugestao">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/></svg>
                    Sugestão
                  </span>
                </label>
                <label class="feedback-type-option">
                  <input type="radio" name="type" value="feature">
                  <span class="feedback-type-pill feedback-type-pill--feature">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M12 2 L15 8.5 L22 9.3 L17 14 L18.2 21 L12 17.8 L5.8 21 L7 14 L2 9.3 L9 8.5 Z"/></svg>
                    Funcionalidade
                  </span>
                </label>
                <label class="feedback-type-option">
                  <input type="radio" name="type" value="pergunta">
                  <span class="feedback-type-pill feedback-type-pill--pergunta">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
                    Pergunta
                  </span>
                </label>
                <label class="feedback-type-option">
                  <input type="radio" name="type" value="elogio">
                  <span class="feedback-type-pill feedback-type-pill--elogio">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                    Elogio
                  </span>
                </label>
                <label class="feedback-type-option">
                  <input type="radio" name="type" value="parceria">
                  <span class="feedback-type-pill feedback-type-pill--parceria">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Parceria
                  </span>
                </label>
              </div>
            </div>

            <div class="field">
              <label class="field-label" for="feedback-title">Título <span class="required">*</span></label>
              <input type="text" id="feedback-title" class="input" maxlength="120" placeholder="Resumo curto do que aconteceu ou da ideia" required>
            </div>

            <div class="field">
              <label class="field-label" for="feedback-description">Descrição <span class="required">*</span></label>
              <textarea id="feedback-description" class="textarea" rows="5" maxlength="2000" placeholder="Conta com mais detalhes — passos pra reproduzir o bug, ou como você imagina a funcionalidade…" required></textarea>
            </div>

            <div class="feedback-form-actions">
              <button type="submit" class="btn btn-primary" id="btn-feedback-submit">Enviar</button>
            </div>
          </form>
        </section>

        <!-- ============================================================
             SEÇÃO: Suas entradas anteriores
             ============================================================ -->
        <section class="feedback-section feedback-section--list">
          <header class="feedback-section-header">
            <h2 class="feedback-section-title">Suas entradas</h2>
            <p class="feedback-section-hint">Acompanhe o status do que você já enviou.</p>
          </header>

          <div id="feedback-mine-loading" class="loading-overlay" style="position:relative; min-height:120px;">
            <span class="spinner"></span>
          </div>
          <div id="feedback-mine-list" class="feedback-list hidden"></div>
          <div id="feedback-mine-empty" class="feedback-empty hidden">
            <p>Você ainda não enviou nada. Use o formulário acima.</p>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="src/js/pages/feedback.js"></script>
</body>
</html>
