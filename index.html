<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar · FinFlow</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script>(function(){try{var t=localStorage.getItem("finflow.tema");if(t==="escuro"||(t!=="claro"&&window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)){document.documentElement.setAttribute("data-theme","dark");}}catch(e){}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=optional" rel="stylesheet">
  <link rel="stylesheet" href="src/css/variables.css">
  <link rel="stylesheet" href="src/css/global.css">
  <link rel="stylesheet" href="src/css/components.css">
  <link rel="stylesheet" href="src/css/layout.css">
</head>
<body class="body-loading">
  <div class="auth-layout">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-mark"></div>
        <div class="auth-logo-name">FinFlow</div>
      </div>

      <div data-mode="login">
        <h1 class="auth-title" data-i18n-key="login.titulo_login">Bem-vindo de volta</h1>
        <p class="auth-subtitle">Entre com seu email e senha para acessar suas finanças.</p>

        <form id="form-login" class="auth-form" novalidate>
          <div class="field">
            <label class="field-label" for="login-email">Email</label>
            <input type="email" id="login-email" name="email" class="input" autocomplete="email" required placeholder="seu@email.com">
            <p class="field-error hidden" data-error="email"></p>
          </div>

          <div class="field">
            <label class="field-label" for="login-password">Senha</label>
            <div class="input-with-icon has-right-icon">
              <input type="password" id="login-password" name="password" class="input" autocomplete="current-password" required minlength="6" placeholder="••••••••">
              <button type="button" class="icon" data-toggle-password="login-password" aria-label="Mostrar senha">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <p class="field-error hidden" data-error="password"></p>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" id="btn-login-submit">
            Entrar
          </button>
        </form>

        <div class="auth-footer">
          <button type="button" class="auth-forgot-link" data-action="forgot">Esqueci minha senha</button>
          <div class="auth-sep"><span>ou</span></div>
          <p class="auth-signup-row">Ainda não tem conta? <button type="button" class="auth-link" data-action="show-signup">Criar agora</button></p>
        </div>
      </div>

      <div data-mode="signup" class="hidden">
        <h1 class="auth-title" data-i18n-key="login.titulo_signup">Criar sua conta</h1>
        <p class="auth-subtitle">Comece a organizar suas finanças em segundos.</p>

        <form id="form-signup" class="auth-form" novalidate>
          <div class="field">
            <label class="field-label" for="signup-name">Nome</label>
            <input type="text" id="signup-name" name="nome" class="input" autocomplete="name" required placeholder="Como devemos te chamar?">
          </div>

          <div class="field">
            <label class="field-label" for="signup-email">Email</label>
            <input type="email" id="signup-email" name="email" class="input" autocomplete="email" required placeholder="seu@email.com">
          </div>

          <div class="field">
            <label class="field-label" for="signup-password">Senha</label>
            <div class="input-with-icon has-right-icon">
              <input type="password" id="signup-password" name="password" class="input" autocomplete="new-password" required minlength="8" placeholder="Mínimo 8 caracteres">
              <button type="button" class="icon" data-toggle-password="signup-password" aria-label="Mostrar senha">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" id="btn-signup-submit">
            Criar conta
          </button>
        </form>

        <p class="auth-footer">
          Já tem conta? <button type="button" class="auth-link" data-action="show-login">Entrar</button>
        </p>
      </div>

      <div data-mode="forgot" class="hidden">
        <h1 class="auth-title" data-i18n-key="login.titulo_forgot">Recuperar senha</h1>
        <p class="auth-subtitle">Enviaremos um link para redefinir sua senha.</p>

        <form id="form-forgot" class="auth-form" novalidate>
          <div class="field">
            <label class="field-label" for="forgot-email">Email</label>
            <input type="email" id="forgot-email" name="email" class="input" autocomplete="email" required placeholder="seu@email.com">
          </div>

          <button type="submit" class="btn btn-primary btn-lg">
            Enviar link de recuperação
          </button>
        </form>

        <p class="auth-footer">
          <button type="button" class="auth-link" data-action="show-login">Voltar ao login</button>
        </p>
      </div>

      <p class="auth-lgpd-links">
        <a href="/privacidade.html">Política de Privacidade</a> · <a href="/termos.html">Termos de Uso</a>
      </p>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="src/js/pages/login.js"></script>
</body>
</html>
